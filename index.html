<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Love Quiz</title>
    <!-- ใช้ฟอนต์ Kanit จาก Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #ff4d6d;
        --secondary-color: #ff758f;
        --bg-gradient: linear-gradient(135deg, #fff0f5 0%, #ffb3c6 100%);
        --glass-bg: rgba(255, 255, 255, 0.75);
        --text-color: #5c2a35;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Kanit", sans-serif;
        min-height: 100vh;
        background: var(--bg-gradient);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }

      /* สร้างก้อนหัวใจลอยตัวอยู่ด้านหลัง */
      .floating-hearts {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 0;
      }

      .heart {
        position: absolute;
        font-size: 20px;
        color: rgba(255, 77, 109, 0.2);
        animation: floatUp 10s linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(110vh) rotate(0deg);
          opacity: 0;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(-100vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* Container หลัก */
      .container {
        background: var(--glass-bg);
        backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกเบลอ */
        padding: 40px 50px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
        text-align: center;
        max-width: 500px;
        width: 90%;
        z-index: 1;
        border: 2px solid rgba(255, 255, 255, 0.5);
        transition: transform 0.3s ease;
      }

      h1 {
        font-weight: 600;
        font-size: 2.2rem;
        margin-bottom: 10px;
        background: linear-gradient(to right, #ff4d6d, #d63384);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p.subtitle {
        font-weight: 300;
        margin-bottom: 30px;
        font-size: 1.1rem;
      }

      /* ส่วนคำถาม */
      #question {
        font-size: 1.4rem;
        font-weight: 400;
        margin-bottom: 25px;
        min-height: 60px;
        transition: opacity 0.5s ease;
      }

      input[type="text"] {
        width: 100%;
        padding: 15px;
        font-size: 18px;
        font-family: "Kanit", sans-serif;
        border: 2px solid rgba(255, 77, 109, 0.3);
        border-radius: 12px;
        outline: none;
        text-align: center;
        background: rgba(255, 255, 255, 0.6);
        transition: all 0.3s ease;
      }

      input[type="text"]:focus {
        border-color: var(--primary-color);
        background: #fff;
        box-shadow: 0 0 10px rgba(255, 77, 109, 0.2);
        transform: scale(1.02);
      }

      button {
        margin-top: 20px;
        padding: 12px 40px;
        font-size: 18px;
        font-family: "Kanit", sans-serif;
        font-weight: 600;
        background: linear-gradient(to right, #ff4d6d, #ff758f);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 77, 109, 0.5);
      }

      button:active {
        transform: translateY(0);
      }

      /* Feedback Effects */
      .shake {
        animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        border-color: #ff0033 !important;
        background-color: rgba(255, 0, 51, 0.05) !important;
      }

      @keyframes shake {
        10%,
        90% {
          transform: translate3d(-1px, 0, 0);
        }
        20%,
        80% {
          transform: translate3d(2px, 0, 0);
        }
        30%,
        50%,
        70% {
          transform: translate3d(-4px, 0, 0);
        }
        40%,
        60% {
          transform: translate3d(4px, 0, 0);
        }
      }

      #result {
        margin-top: 20px;
        min-height: 80px;
      }

      .success-msg {
        font-size: 1.2rem;
        color: #28a745;
        font-weight: 600;
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popIn {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* Final Screen */
      #final-screen {
        display: none;
        animation: fadeIn 1s ease;
      }

      .final-image {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 50%;
        margin: 20px 0;
        border: 5px solid #fff;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Confetti */
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #f00;
        animation: confettiFall 3s linear forwards;
      }

      @keyframes confettiFall {
        0% {
          transform: translateY(-100vh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- สร้างก้อนหัวใจลอยตัวด้านหลัง -->
    <div class="floating-hearts" id="bg-hearts"></div>

    <div class="container" id="quiz-container">
      <h1>💖 ความทรงจำของเรา 💖</h1>
      <p class="subtitle">ตอบคำถามเพื่อพิสูจน์ความรัก!</p>

      <div id="quiz">
        <p id="question"></p>
        <input
          type="text"
          id="answer"
          placeholder="พิมพ์คำตอบที่นี่..."
          autocomplete="off"
        />
        <button onclick="checkAnswer()">ส่งคำตอบ</button>
        <div id="result"></div>
      </div>

      <div id="final-screen">
        <h2>🎉 ผ่านแล้วน้าแฟนน!!! 🎉</h2>
        <p>เธอคือคนที่เข้าใจเค้าที่สุด</p>
        <!-- เปลี่ยนเป็นรูปแฟนคุณหรือรูปน่ารักๆ -->
        <img class="final-image" src="img/fan.jpg" alt="Love" />
        <p style="margin-top: 20px; font-weight: 600">รักแฟนน้า 💕</p>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
