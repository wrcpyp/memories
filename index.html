<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Love Quiz</title>
    <!-- ใช้ฟอนต์ Kanit จาก Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- สร้างก้อนหัวใจลอยตัวด้านหลัง -->
    <div class="floating-hearts" id="bg-hearts"></div>

    <div class="container" id="quiz-container">
      <h1>💖 ความทรงจำของเรา 💖</h1>
      <p class="subtitle">ตอบคำถามเพื่อพิสูจน์ความรัก!</p>

      <div id="quiz">
        <p id="question"></p>
        <input
          type="text"
          id="answer"
          placeholder="พิมพ์คำตอบที่นี่..."
          autocomplete="off"
        />
        <button onclick="checkAnswer()">ส่งคำตอบ</button>
        <div id="result"></div>
      </div>

      <div id="final-screen">
        <h2>🎉 ผ่านแล้วน้าแฟนน!!! 🎉</h2>
        <p>เธอคือบ้านที่อบอุ่นที่สุดของเค้า</p>
        <!-- เปลี่ยนเป็นรูปแฟนคุณหรือรูปน่ารักๆ -->
        <img class="final-image" src="img/fan.jpg" alt="Love" />
        <p style="margin-top: 20px; font-weight: 600">รักแฟนน้า 💕</p>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
